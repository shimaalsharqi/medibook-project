<div class="container mt-4">

  <h2 class="mb-4">Doctors List</h2>

  <div class="row">

    <div class="col-md-4" *ngFor="let doctor of doctors">

    
      <app-doctor-card-component
        [doctor]="doctor"
        (selectDoctor)="onDoctorSelected($event)">
      </app-doctor-card-component>

    </div>

  </div>

</div>
