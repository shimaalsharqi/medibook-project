<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Doctors - MediBook</title>

  <link rel="stylesheet" href="./css/bootstrap.min.css">
  <link rel="stylesheet" href="./css/all.min.css">
  <link rel="stylesheet" href="./css/style.css">
</head>

<body class="doctors-page">

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand fw-bold" href="#">
                Medi<span class="text-primary">Book+</span>
            </a>

      <div class="ms-auto">
        <a class="linkk" href="index.html">Home</a>
        <a class="linkk" href="doctors.html">Doctors</a>
      </div>
    </div>
  </nav>

  <div class="container py-5">
    <div class="row">

      <!-- Sidebar -->
      <div class="col-md-3">
        <div class="p-3 bg-light rounded shadow-sm">

          <h5>Filter Results</h5>

          <!-- Specialty -->
          <label class="mt-3">Specialty</label>
          <select id="specialtyFilter" class="form-control">
            <option value="All">All Specialties</option>
            <option>General Medicine</option>
            <option>Cardiology</option>
            <option>Dermatology</option>
            <option>Pediatrics</option>
            <option>Orthopedics</option>
            <option>Dentistry</option>
          </select>

          <!-- Sort -->
          <label class="mt-3">Sort</label>
          <select id="sortFilter" class="form-control">
            <option value="">Default</option>
            <option value="rating">Rating High → Low</option>
            <option value="experience">Experience High → Low</option>
          </select>

        </div>
      </div>

      <!-- Doctors -->
      <div class="col-md-9">

        <h1>Top Specialists</h1>

        <!-- 🔍 Search -->
        <input type="text" id="searchInput" class="form-control mb-3" placeholder="Search by name or specialty...">

        <p id="countText"></p>

        <div class="row" id="doctorsContainer"></div>

      </div>

    </div>
  </div>

  <script src="JS/doctors.js"></script>
  <script src="./js/all.min.js"></script>
  <script src="./js/bootstrap.bundle.min.js"></script>
</body>

</html>
